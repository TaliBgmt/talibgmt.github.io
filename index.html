<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bushveld Complex Knowledge Atlas — Weekly Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --surface2: #161616;
    --border: #222;
    --text: #e2d9c8;
    --muted: #666;
    --faint: #1e1e1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(160deg, #0d1a0d 0%, #0a0d1a 55%, #1a0d08 100%);
    border-bottom: 1px solid #2a2a2a;
    padding: 28px 32px 22px;
  }
  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 20px;
  }
  .header-eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 700;
    color: #f0e8d8;
    line-height: 1.1;
  }
  .header-sub {
    font-size: 11px;
    color: #8a7f70;
    margin-top: 6px;
    letter-spacing: 1px;
  }
  .overall-block { text-align: right; }
  .overall-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .overall-pct {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    color: #e2d9c8;
    transition: color 0.4s;
  }
  .overall-bar-wrap {
    margin-top: 8px;
    background: #1a1a1a;
    border-radius: 3px;
    height: 4px;
    width: 160px;
    margin-left: auto;
    overflow: hidden;
  }
  .overall-bar {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #4a9eca, #52b788);
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── LAYOUT ── */
  .container { max-width: 1080px; margin: 0 auto; padding: 28px 24px; }

  /* ── MONTH GRID ── */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 28px;
  }
  .month-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 6px 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .month-btn:hover { border-color: #444; }
  .month-btn.active { border-width: 2px; }
  .month-btn-num {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .month-btn-name {
    font-size: 10px;
    color: #999;
    line-height: 1.3;
    margin-bottom: 7px;
  }
  .month-btn.active .month-btn-name { color: #e2d9c8; }
  .month-mini-bar-wrap {
    background: #1a1a1a;
    border-radius: 2px;
    height: 3px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .month-mini-bar { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .month-mini-pct { font-size: 9px; }

  /* ── MONTH HEADER ── */
  .month-header {
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid transparent;
    transition: all 0.3s;
  }
  .month-header-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .month-header-theme {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: #f0e8d8;
  }
  .month-progress-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-weight: 700;
    text-align: right;
    line-height: 1;
    transition: color 0.3s;
  }
  .month-progress-label { font-size: 10px; color: var(--muted); text-align: right; margin-top: 2px; }

  /* ── WEEKS ── */
  .week-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .week-card:hover { border-color: #333; }

  .week-header {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    padding: 13px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-align: left;
    color: var(--text);
  }
  .week-header-left { display: flex; align-items: center; gap: 12px; }
  .week-tag {
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 3px 9px;
    border-radius: 5px;
    border: 1px solid;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .week-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 600;
    color: #ddd5c5;
  }
  .week-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .week-header-right { display: flex; align-items: center; gap: 10px; }
  .dot-row { display: flex; gap: 4px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    transition: background 0.2s;
  }
  .chevron { color: #555; font-size: 12px; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* ── DELIVERABLES ── */
  .deliverables {
    border-top: 1px solid var(--faint);
    padding: 6px 18px 14px;
    display: none;
  }
  .deliverables.open { display: block; }

  .deliverable-row {
    display: flex;
    align-items: flex-start;
    gap: 11px;
    padding: 9px 0;
    border-bottom: 1px solid #141414;
  }
  .deliverable-row:last-child { border-bottom: none; }

  .status-btn {
    flex-shrink: 0;
    margin-top: 1px;
    width: 19px; height: 19px;
    border-radius: 50%;
    border: 2px solid #444;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all 0.2s;
    color: #fff;
  }
  .status-btn[data-s="done"] { background: #10b981; border-color: #10b981; }
  .status-btn[data-s="progress"] { border-color: #f59e0b; background: transparent; }
  .status-btn[data-s="none"] { border-color: #3a3a3a; }

  .deliverable-text {
    flex: 1;
    line-height: 1.55;
    color: #ccc5b8;
    font-size: 12.5px;
    transition: all 0.2s;
  }
  .deliverable-text.done { color: #555; text-decoration: line-through; }

  .status-badge {
    margin-top: 4px;
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .badge-none { background: #1a1a1a; color: #555; border-color: #2a2a2a; }
  .badge-progress { background: #2d1f00; color: #f59e0b; border-color: #4a3000; }
  .badge-done { background: #022c1a; color: #10b981; border-color: #064a2a; }

  /* ── LEGEND ── */
  .legend {
    margin-top: 24px;
    padding: 14px 18px;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 7px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .legend-label { font-size: 10px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }
  .legend-text { font-size: 11px; color: #777; }
  .legend-tip { font-size: 10px; color: #3a3a3a; margin-left: 8px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">Knowledge Atlas Build Programme</div>
      <div class="header-title">Bushveld Complex</div>

    </div>

</header>

<div class="container">

    <div class="legend-item"><div class="legend-dot" style="background:transparent;border:2px solid #f59e0b"></div><span class="legend-text">In Progress</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div><span class="legend-text">Done</span></div>
    <span class="legend-tip">Click the circle or badge to cycle status · Progress saves in your browser</span>

</div>

// ── STATE ──
const STORAGE_KEY = 'bushveld_status_v1';
let statuses = {};
try { statuses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e){}
let openWeeks = {};
let selectedMonth = 0;

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(statuses)); } catch(e){}
}

function statusKey(mi, week, di) { return `${mi}_${week}_${di}`; }

function getStatus(mi, week, di) { return statuses[statusKey(mi,week,di)] || 'none'; }

function cycleStatus(mi, week, di) {
  const k = statusKey(mi,week,di);
  const cur = statuses[k] || 'none';
  statuses[k] = cur === 'none' ? 'progress' : cur === 'progress' ? 'done' : 'none';
  save();
  render();
}

function monthProgress(mi) {
  const m = MONTHS[mi];
  let total=0, done=0;
  m.weeks.forEach(w => w.deliverables.forEach((_,di) => {
    total++;
    if(getStatus(mi,w.week,di)==='done') done++;
  }));
  return total ? Math.round(done/total*100) : 0;
}

function overallProgress() {
  let total=0, done=0;
  MONTHS.forEach((m,mi) => m.weeks.forEach(w => w.deliverables.forEach((_,di) => {
    total++;
    if(getStatus(mi,w.week,di)==='done') done++;
  })));
  return total ? Math.round(done/total*100) : 0;
}

// ── RENDER ──
function render() {
  const overall = overallProgress();
  document.getElementById('overallPct').textContent = overall + '%';
  document.getElementById('overallBar').style.width = overall + '%';
  const op = document.getElementById('overallPct');
  op.style.color = overall > 66 ? '#10b981' : overall > 33 ? '#f59e0b' : '#e2d9c8';

  renderMonthGrid();
  renderMonthHeader();
  renderWeeks();
}

function renderMonthGrid() {
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  MONTHS.forEach((m, mi) => {
    const p = monthProgress(mi);
    const active = mi === selectedMonth;
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (active ? ' active' : '');
    btn.style.background = active ? m.color : 'var(--surface)';
    btn.style.borderColor = active ? m.accent : 'var(--border)';
    btn.innerHTML = `
      <div class="month-btn-num" style="color:${active ? m.accent : 'var(--muted)'}">${'M'+m.month}</div>
      <div class="month-btn-name">${m.label.split(' ')[0]}</div>
      <div class="month-mini-bar-wrap">
        <div class="month-mini-bar" style="width:${p}%;background:${m.accent}"></div>
      </div>
      <div class="month-mini-pct" style="color:${p>0 ? m.accent : '#333'}">${p}%</div>
    `;
    btn.addEventListener('click', () => { selectedMonth = mi; render(); });
    grid.appendChild(btn);
  });
}

function renderMonthHeader() {
  const m = MONTHS[selectedMonth];
  const p = monthProgress(selectedMonth);
  const hdr = document.getElementById('monthHeader');
  hdr.style.background = m.color;
  hdr.style.borderColor = m.accent + '44';
  document.getElementById('mhLabel').style.color = m.accent;
  document.getElementById('mhLabel').textContent = `Month ${m.month} · ${m.label}`;
  document.getElementById('mhTheme').textContent = m.theme;
  const pctEl = document.getElementById('mhPct');
  pctEl.textContent = p + '%';
  pctEl.style.color = m.accent;
}

function renderWeeks() {
  const m = MONTHS[selectedMonth];
  const container = document.getElementById('weeksContainer');
  container.innerHTML = '';

  m.weeks.forEach((week, wi) => {
    const wKey = `${selectedMonth}_${wi}`;
    if (!(wKey in openWeeks)) openWeeks[wKey] = true;
    const isOpen = openWeeks[wKey];

    const wStatuses = week.deliverables.map((_,di) => getStatus(selectedMonth, week.week, di));
    const done = wStatuses.filter(s=>s==='done').length;
    const inProg = wStatuses.filter(s=>s==='progress').length;
    const total = week.deliverables.length;

    const card = document.createElement('div');
    card.className = 'week-card';

    // dots
    const dots = week.deliverables.map((_,di) => {
      const s = getStatus(selectedMonth, week.week, di);
      const c = s==='done' ? '#10b981' : s==='progress' ? '#f59e0b' : '#2a2a2a';
      return `<div class="dot" style="background:${c}"></div>`;
    }).join('');

    card.innerHTML = `
      <button class="week-header" data-wkey="${wKey}">
        <div class="week-header-left">
          <div class="week-tag" style="color:${m.accent};border-color:${m.accent}44;background:${m.color}">
            WK ${week.week}
          </div>
          <div>
            <div class="week-title">${week.title}</div>
            <div class="week-sub">${done} of ${total} done${inProg > 0 ? ' · ' + inProg + ' in progress' : ''}</div>
          </div>
        </div>
        <div class="week-header-right">
          <div class="dot-row">${dots}</div>
          <div class="chevron${isOpen?' open':''}">▼</div>
        </div>
      </button>
      <div class="deliverables${isOpen?' open':''}" id="del_${wKey}">
        ${week.deliverables.map((d,di) => {
          const s = getStatus(selectedMonth, week.week, di);
          const isDone = s==='done';
          const badgeClass = s==='done'?'badge-done':s==='progress'?'badge-progress':'badge-none';
          const badgeLabel = s==='done'?'Done':s==='progress'?'In Progress':'Not Started';
          const dotC = s==='done'?'#10b981':s==='progress'?'#f59e0b':'';
          const dotStyle = s==='done'
            ? 'background:#10b981;border-color:#10b981'
            : s==='progress'
            ? 'background:transparent;border-color:#f59e0b'
            : 'background:transparent;border-color:#3a3a3a';
          const innerIcon = s==='done'?'✓':s==='progress'?'◐':'';
          return `
            <div class="deliverable-row">
              <button class="status-btn" data-s="${s}" data-mi="${selectedMonth}" data-week="${week.week}" data-di="${di}" style="${dotStyle}">${innerIcon}</button>
              <div>
                <div class="deliverable-text${isDone?' done':''}">${d}</div>
                <span class="status-badge ${badgeClass}" data-mi="${selectedMonth}" data-week="${week.week}" data-di="${di}">${badgeLabel}</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    // toggle week open/close
    card.querySelector('.week-header').addEventListener('click', () => {
      openWeeks[wKey] = !openWeeks[wKey];
      render();
    });

    // status buttons
    card.querySelectorAll('.status-btn, .status-badge').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const mi = +el.dataset.mi;
        const week = +el.dataset.week;
        const di = +el.dataset.di;
        cycleStatus(mi, week, di);
      });
    });

    container.appendChild(card);
  });
}

// ── INIT ──
render();
</script>
